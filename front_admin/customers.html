</head>
<body>

<div class="admin-wrapper">

        <span>Dashboard</span>
      </a>
      <a href="bookings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Bookings</span>
      </a>
      <a href="products.html" class="nav-item">

        <span>Products</span>
      </a>
      <div class="nav-label" style="margin-top:8px;">Clients</div>
      <a href="customers.html" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Customers</span>

      <a href="reviews.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Reviews</span>
      </a>
      <div class="nav-label" style="margin-top:8px;">System</div>
      <a href="settings.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/front/index.html" class="nav-item" style="color:var(--text-muted);">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Back to Website</span>
      </a>
      <a href="#" class="nav-item logout" onclick="doAdminLogout(event)">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><h1>Customers</h1></div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
        <div class="admin-profile">
          <div class="admin-avatar" id="admin-avatar">?</div>
          <div>
            <div class="admin-name" id="admin-name">Loading…</div>
            <div class="admin-role">Administrator</div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-content">

      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search by name or email…">
        </div>
        <select class="filter-select">
          <option>All Clients</option>
          <option>Regular (3+ visits)</option>
          <option>New (1 visit)</option>
          <option>VIP</option>
        </select>
        <select class="filter-select">
          <option>Sort by: Last Visit</option>
          <option>Sort by: Name</option>
          <option>Sort by: Total Bookings</option>
        </select>
        <span id="customers-count" style="margin-left:auto;font-size:12px;color:var(--text-muted);font-weight:500;">Loading…</span>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>ID</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="customers-tbody">
              <!-- dynamically populated -->
            </tbody>
          </table>
        </div>
      </div>

</div>

</div>

<!-- ══════════════════════════════════════
     MODAL: Edit Customer
══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-customer" onclick="handleOverlayClick(event,'modal-customer')">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="cm-title">Edit Customer</div>
        <div class="modal-subtitle" id="cm-sub">Update customer details</div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-customer')">&#x2715;</button>
    </div>
    <div class="modal-body">
      <!-- Read-only summary -->
      <div style="margin-bottom:22px;">
        <div class="detail-row">
          <div class="detail-key">ID</div>
          <div class="detail-val" id="cm-d-id">—</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">Full Name</div>
          <div class="detail-val" id="cm-d-name">—</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">Phone</div>
          <div class="detail-val" id="cm-d-phone">—</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">Email</div>
          <div class="detail-val" id="cm-d-email">—</div>
        </div>
      </div>
      <!-- Editable fields -->
      <div style="border-top:1px solid var(--border);padding-top:18px;">
        <div style="font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;">Edit Customer</div>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" class="form-input" id="cm-first-name">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" class="form-input" id="cm-last-name">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" class="form-input" id="cm-phone">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-input" id="cm-email">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-customer')">Cancel</button>
      <button class="btn btn-gold" onclick="saveCustomerChanges()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  const API       = 'http://localhost:8000/api';
  const ADMIN_API = 'http://localhost:8000/api/admin';
  let allCustomers    = [];
  let editingCustomerId = null;

  /* ── Dynamic date ── */
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  /* ── Session guard ── */
  async function checkAdmin() {
    try {
      const res = await fetch(API + '/auth/me', { credentials: 'include', cache: 'no-store' });
      if (!res.ok) { window.location.href = '/front/login.html'; return false; }
      const user = await res.json();
      if (!user.is_admin) { window.location.href = '/front/account.html'; return false; }
      document.getElementById('admin-name').textContent   = user.first_name + ' ' + user.last_name;
      document.getElementById('admin-avatar').textContent = user.first_name.charAt(0).toUpperCase();
      return true;
    } catch(e) { window.location.href = '/front/login.html'; return false; }
  }

  /* ════════════════════════════════════
     Helpers
  ════════════════════════════════════ */
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function initials(first, last) {
    return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
  }

  /* ════════════════════════════════════
     Load customers from API
  ════════════════════════════════════ */
  async function loadCustomers() {
    try {
      const res  = await fetch(`${ADMIN_API}/users`, { credentials: 'include' });
      const data = await res.json();
      allCustomers = data.users || [];
      renderTable(allCustomers);
    } catch (e) {
      console.error('Failed to load customers:', e);
      document.getElementById('customers-tbody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:32px;">Failed to load customers.</td></tr>';
    }
  }

  /* ════════════════════════════════════
     Render table
  ════════════════════════════════════ */
  function renderTable(customers) {
    const tbody = document.getElementById('customers-tbody');
    document.getElementById('customers-count').textContent = customers.length + ' client' + (customers.length !== 1 ? 's' : '') + ' total';

    if (!customers.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:32px;">No customers found.</td></tr>';
      return;
    }

    tbody.innerHTML = customers.map(u => `
      <tr>
        <td>
          <div class="customer-cell">
            <div class="customer-avatar">${escHtml(initials(u.first_name, u.last_name))}</div>
            <span class="td-name">${escHtml(u.first_name)} ${escHtml(u.last_name)}</span>
          </div>
        </td>
        <td style="color:var(--text-muted);">${escHtml(u.email || '—')}</td>
        <td style="color:var(--text-muted);">${escHtml(u.phone || '—')}</td>
        <td><strong>#${u.id}</strong></td>
        <td>
          <div class="action-menu-wrap">
            <button class="action-menu-btn" onclick="toggleMenu(this)">⋯</button>
            <div class="action-dropdown">
              <button class="action-dropdown-item" onclick="openEditCustomerModal(${u.id})"><span class="adi-icon">✎</span> Edit Customer</button>
              <div class="action-dropdown-divider"></div>
              <button class="action-dropdown-item danger" onclick="deleteCustomer(${u.id})"><span class="adi-icon">✕</span> Delete</button>
            </div>
          </div>
        </td>
      </tr>
    `).join('');
  }

  /* ════════════════════════════════════
     Search / filter (client-side)
  ════════════════════════════════════ */
  document.querySelector('.search-box input').addEventListener('input', applyFilters);
  document.querySelectorAll('.filter-select').forEach(s => s.addEventListener('change', applyFilters));

  function applyFilters() {
    const query = document.querySelector('.search-box input').value.toLowerCase();
    const sort  = document.querySelectorAll('.filter-select')[1]?.value || '';

    let filtered = allCustomers.filter(u => {
      const name = ((u.first_name || '') + ' ' + (u.last_name || '')).toLowerCase();
      return !query || name.includes(query) || (u.phone || '').includes(query) || (u.email || '').toLowerCase().includes(query);
    });

    if (sort.includes('Name')) {
      filtered = [...filtered].sort((a, b) =>
        ((a.first_name || '') + ' ' + (a.last_name || '')).localeCompare((b.first_name || '') + ' ' + (b.last_name || ''))
      );
    }

    renderTable(filtered);
  }

  /* ════════════════════════════════════
     Open Edit modal
  ════════════════════════════════════ */
  function openEditCustomerModal(id) {
    const u = allCustomers.find(x => x.id === id);
    if (!u) return;
    editingCustomerId = id;

    document.getElementById('cm-title').textContent   = `Edit — ${u.first_name} ${u.last_name}`;
    document.getElementById('cm-sub').textContent     = `Customer #${u.id}`;
    document.getElementById('cm-d-id').textContent    = u.id;
    document.getElementById('cm-d-name').textContent  = `${u.first_name} ${u.last_name}`;
    document.getElementById('cm-d-phone').textContent = u.phone   || '—';
    document.getElementById('cm-d-email').textContent = u.email || '—';

    document.getElementById('cm-first-name').value = u.first_name || '';
    document.getElementById('cm-last-name').value  = u.last_name  || '';
    document.getElementById('cm-phone').value      = u.phone      || '';
    document.getElementById('cm-email').value      = u.email      || '';

    closeMenu();
    openModal('modal-customer');
  }

  /* ════════════════════════════════════
     Save customer changes
  ════════════════════════════════════ */
  async function saveCustomerChanges() {
    if (!editingCustomerId) return;
    const payload = {
      first_name: document.getElementById('cm-first-name').value.trim(),
      last_name:  document.getElementById('cm-last-name').value.trim(),
      phone:      document.getElementById('cm-phone').value.trim(),
      email:      document.getElementById('cm-email').value.trim(),
    };
    try {
      const res = await fetch(`${ADMIN_API}/users?id=${editingCustomerId}`, {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) { const e = await res.json(); alert('Error: ' + (e.message || res.status)); return; }
      closeModal('modal-customer');
      editingCustomerId = null;
      await loadCustomers();
    } catch (e) { alert('Network error: ' + e.message); }
  }

  /* ════════════════════════════════════
     Delete customer
  ════════════════════════════════════ */
  async function deleteCustomer(id) {
    const u = allCustomers.find(x => x.id === id);
    if (!u) return;
    if (!confirm(`Delete customer "${u.first_name} ${u.last_name}" (ID #${u.id})? This cannot be undone.`)) return;
    closeMenu();
    try {
      const res = await fetch(`${ADMIN_API}/users?id=${id}`, {
        method: 'DELETE',
        credentials: 'include'
      });
      if (!res.ok) { const e = await res.json(); alert('Error: ' + (e.message || res.status)); return; }
      await loadCustomers();
    } catch (e) { alert('Network error: ' + e.message); }
  }

  /* ════════════════════════════════════
     Dropdown menus
  ════════════════════════════════════ */
  function toggleMenu(btn) {
    const drop = btn.nextElementSibling;
    const isOpen = drop.classList.contains('open');
    closeMenu();
    if (!isOpen) drop.classList.add('open');
  }
  function closeMenu() {
    document.querySelectorAll('.action-dropdown.open').forEach(d => d.classList.remove('open'));
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.action-menu-wrap')) closeMenu();
  });

  /* ════════════════════════════════════
     Modals
  ════════════════════════════════════ */
  function openModal(id) {
    document.getElementById(id).classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
    closeMenu();
  }
  function handleOverlayClick(e, id) {
    if (e.target === document.getElementById(id)) closeModal(id);
  }

  /* Escape closes modals */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.open').forEach(m => {
        m.classList.remove('open');
        document.body.style.overflow = '';
      });
      closeMenu();
    }
  });

  async function doAdminLogout(e) {
    e.preventDefault();
    try { await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
    window.location.href = '/front/index.html';
  }

  /* ── Boot ── */
  checkAdmin().then(ok => { if (ok) loadCustomers(); });
</script>

</body>
</html>
