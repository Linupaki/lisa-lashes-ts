<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Lisa's Lashes</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <h1>Sign In</h1>
      <p class="subtitle">Welcome back. Please enter your details.</p>

      <form action="/auth/login" method="POST">
        <div class="form-group">
          <label for="email">Email address or Phone number</label>
          <input type="email" id="email" name="email" placeholder="anna@mail.com or +3531234567" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="options">
          <label class="remember">
            <input type="checkbox" name="remember" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <p class="signup">Don't have an account? <a href="register.html">Create one</a></p>

    </div>
  </div>

</body>
</html>
