<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Lisa's Lashes</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <h1>Create Account</h1>
      <p class="subtitle">Join us today. Fill in your details below.</p>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="name" id="name" name="first_name" autocomplete="name" required />
        </div>
        
        <div class="form-group">
          <label for="surname">Surname</label>
          <input type="surname" id="surname" name="last_name" autocomplete="family-name" required />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="address" placeholder="anna@mail.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="+353 87 123 4567" autocomplete="tel" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password_hash" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

<p class="signup">Already have an account? <a href="#">Sign in</a></p>

    </div>
  </div>

    <script>
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const first_name = document.getElementById('name').value;
        const last_name = document.getElementById('surname').value;
        const address = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password_hash = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password_hash !== confirmPassword) {
          alert('Passwords do not match');
          return;
        }

        try {
          const registerRes = await fetch('/user', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify ({
              first_name,
              last_name,
              address,
              phone,
              password_hash
            })
          });

          if (!registerRes.ok) {
            alert('Registration failed');
            return;
          }

          const loginRes = await fetch('/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            credentials: 'include',
            body: JSON.stringify({
              identifier: address,
              password: password_hash
            })
          });

          const loginData = await loginRes.json();

          if (loginData.success) {
            window.location.href = '/account.html';
          } else {
            alert('Account created but login failed');
          }

        } catch (err) {
          console.error(err);
          alert('Server error');
        }
      });
    </script>
</body>
</html>
