<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Lisa's Lashes</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <h1>Create Account</h1>
      <p class="subtitle">Join us today. Fill in your details below.</p>

      <form action="#" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="name" id="name" name="name" autocomplete="name" required />
        </div>
        
        <div class="form-group">
          <label for="surname">Surname</label>
          <input type="surname" id="surname" name="surname" autocomplete="surname" required />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="anna@mail.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="+353 87 123 4567" autocomplete="tel" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

<p class="signup">Already have an account? <a href="#">Sign in</a></p>

    </div>
  </div>

</body>
</html>
