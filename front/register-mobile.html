<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Lisa's Lashes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login-mobile.css" />
  <link rel="stylesheet" href="menu-mobile.css" />
</head>
<body>

<!-- MENU -->
<div id="menuOverlay" class="menu-overlay" onclick="closeMenu()"></div>

<div id="mobileMenu" class="mobile-menu">
  <div class="menu-header">
    <div class="menu-logo">Lisa's Lashes</div>
    <button class="close-btn" onclick="closeMenu()">✕</button>
  </div>

  <div class="menu-search">
    <input type="text" placeholder="search">
  </div>

  <div class="menu-links">
    <a href="catologue-mobile.html" class="menu-item">Catalogue</a>
    <a href="about-mobile.html" class="menu-item">About us</a>
    <a href="in-progress-mobile.html" class="menu-item">For Lashes Stylists</a>
    <a href="shop-mobile.html" class="menu-item">Shop</a>
    <a href="in-progress-mobile.html" class="menu-item">Become a partner</a>
    <a href="course-mobile.html" class="menu-item">Courses</a>
    <hr style="margin: 12px 0;">
    <a href="checkout-mobile.html" class="menu-item">Checkout</a>
    <a href="login-mobile.html" class="menu-item">Login</a>
    <a href="register-mobile.html" class="menu-item">Register</a>
  </div>

  <a href="index-mobile.html" class="menu-book">Book Now</a>

  <hr>

  <div class="menu-contact">
    <strong>Contact Us!</strong><br>
    Tel: <b>+087 1234567</b><br>
    Email: info@LisasLashes.ie
  </div>

  <div class="menu-social">
    📸 📘 🎵 ▶
  </div>
</div>

  <div class="login-wrapper">
    <div class="login-card">

      <h1>Create Account</h1>
      <p class="subtitle">Join us today. Fill in your details below.</p>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="first_name" autocomplete="name" required />
        </div>
        
        <div class="form-group">
          <label for="surname">Surname</label>
          <input type="text" id="surname" name="last_name" autocomplete="family-name" required />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="address" placeholder="anna@mail.com" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="+353 87 123 4567" autocomplete="tel" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password</label>
          <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" autocomplete="new-password" required />
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <p class="signup">Already have an account? <a href="login-mobile.html">Sign in</a></p>

    </div>
  </div>

<script>
function openMenu() {
  document.getElementById('mobileMenu').classList.add('open');
  document.getElementById('menuOverlay').classList.add('show');
}

function closeMenu() {
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('show');
}

async function checkAlreadyLoggedIn() {
  try {
    const res = await fetch('/auth/me', { credentials: 'include', cache: 'no-store' });
    if (res.ok) {
      window.location.href = '/account-mobile.html';
    }
  } catch (_) {}
}

document.addEventListener('DOMContentLoaded', () => {
  checkAlreadyLoggedIn();

  const form = document.getElementById('register-form');
  if (!form) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const first_name = document.getElementById('name')?.value || '';
    const last_name = document.getElementById('surname')?.value || '';
    const address = document.getElementById('email')?.value || '';
    const phone = document.getElementById('phone')?.value || '';
    const password_hash = document.getElementById('password')?.value || '';
    const confirmPassword = document.getElementById('confirm-password')?.value || '';

    if (password_hash !== confirmPassword) {
      alert('Passwords do not match');
      return;
    }

    try {
      const registerRes = await fetch('/user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name, last_name, address, phone, password_hash }),
      });

      if (!registerRes.ok) {
        alert('Registration failed');
        return;
      }

      const loginRes = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ identifier: address, password: password_hash }),
      });

      const loginData = await loginRes.json().catch(() => null);
      if (!loginRes.ok || !loginData?.success) {
        alert('Account created but login failed');
        return;
      }

      window.location.href = '/account-mobile.html';
    } catch (err) {
      console.error(err);
      alert('Server error');
    }
  });
});
</script>

</body>
</html>
